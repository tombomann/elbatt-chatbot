name: Sync .env til server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'   # Kj├©r daglig kl 04:00

jobs:
  sync-env:
    runs-on: ubuntu-latest
    steps:
    - name: Sjekk ut repo
      uses: actions/checkout@v4

    - name: Lag .env-fil
      run: |
        cat <<EOF > .env
        GITHUB=${{ secrets.GITHUB }}
        MAC=${{ secrets.MAC }}
        NETLIFY_AUTH_TOKEN=${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID=${{ secrets.NETLIFY_SITE_ID }}
        NOTIFY_EMAIL=${{ secrets.NOTIFY_EMAIL }}
        OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        PAT=${{ secrets.PAT }}
        PAT_TOKEN=${{ secrets.PAT_TOKEN }}
        SCALEAWAY_HOST=51.15.203.146
        SCALEAWAY_SSH_KEY=${{ secrets.SCALEAWAY_SSH_KEY }}
        SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG=${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
        SLACK_WEBHOOK=${{ secrets.SLACK_WEBHOOK }}
        SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
        SONAR_ORGANIZATION=${{ secrets.SONAR_ORGANIZATION }}
        SONAR_PROJECT_KEY=${{ secrets.SONAR_PROJECT_KEY }}
        SONAR_TOKEN=${{ secrets.SONAR_TOKEN }}
        SSH_PRIVATE_KEY=${{ secrets.SSH_PRIVATE_KEY }}
        VEGVESEN_API_KEY=${{ secrets.VEGVESEN_API_KEY }}
        EOF

        - name: Restart chatbot-service
        uses: appleboy/ssh-action@v1.0.3
        with:
        host: 51.15.203.146
        username: root
        key: ${{ secrets.SCALEAWAY_SSH_KEY }}
        script: |
          systemctl restart elbatt-chatbot.service
